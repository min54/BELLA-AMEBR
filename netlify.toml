# Netlify configuration for the Next.js frontend.
# The FastAPI backend is NOT deployed here — host it separately
# (Railway/Render/Fly.io) and set NEXT_PUBLIC_API_URL in the Netlify
# site environment variables to its public URL.

[build]
  base = "frontend"
  command = "npm run build"
  # NOTE: Do not set `publish` here. @netlify/plugin-nextjs manages the
  # publish directory automatically and wires up Next.js server routes
  # as serverless functions. Setting publish=".next" causes Netlify to
  # serve the raw build output as static files, which 404s every route.

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

# Explicitly require the Next.js runtime plugin. Netlify usually auto-
# installs this when it detects Next.js, but pinning it here removes
# any ambiguity in monorepo builds.
[[plugins]]
  package = "@netlify/plugin-nextjs"
