# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploys the FastAPI backend from the /backend directory as a free-tier
# web service. The Next.js frontend is NOT deployed here — it lives on
# Netlify and must set NEXT_PUBLIC_API_URL to this service's public URL.
#
# NOTE: The free plan sleeps after ~15 min idle. First request after a
# sleep takes 30-60s (cold start). Fine for a prototype; upgrade to
# Starter plan before going live with real applicants.

services:
  - type: web
    name: bella-amebr-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: Bella Korea Ambassador API
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./bella.db
      - key: CORS_ORIGINS
        value: https://funny-lebkuchen-57b10a.netlify.app,http://localhost:3000
      # Resend (HTTP email API) — required on Render because the free tier
      # blocks outbound SMTP. Set RESEND_API_KEY manually in the dashboard
      # so the secret never hits the public git repo. Sender uses the
      # renovoh.net domain, which is already verified in the Resend account.
      - key: RESEND_FROM
        value: Bella Korea Ambassador <no-reply@renovoh.net>
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_TO
        value: kataroteno@gmail.com
